<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Bonjour, Gris</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
  color: black;
  text-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
}

.container { padding: 20px; max-width: 90vw; }

button {
  padding: 15px 25px;
  margin: 8px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.yes { background:#28a745;color:white; }
.no { background:#dc3545;color:white; position:relative; }
.next { background:#007bff;color:white; }
.tbd { background:#A8B0B3;color:white; }

.selected { outline:3px solid black; transform:scale(1.05); }

.options { display:flex; justify-content:center; gap:30px; }
.column { display:flex; flex-direction:column; }

canvas { position:fixed; top:0; left:0; pointer-events:none; }

.fade-in { opacity:0; animation:fadeIn .6s forwards; }
@keyframes fadeIn { to {opacity:1;} }
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container" id="main">
  <h1>Hello there, Miss Gris 😊</h1>
  <h2>I'd love to have a date this week with You</h2>
  <button class="yes" onclick="yesClicked()">Sure!</button>
  <button class="no" id="noBtn">Maybe another time</button>
</div>

<script>

/* CANVAS */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

/* STATE */
let selectedTime = "";
let selectedDate = "";
let selectedActivity = "";
let pieces = [];
let animationMode = "hallows";

/* START */
startParticles();
animate();

/* NO BUTTON */
let noClicks = 0;
document.getElementById("noBtn").addEventListener("click", () => {
  noClicks++;

  if (noClicks <= 1) {
    const rect = document.getElementById("main").getBoundingClientRect();
    let x, y, safe = false;

    while (!safe) {
      x = Math.random() * (window.innerWidth - 120);
      y = Math.random() * (window.innerHeight - 50);

      if (
        x < rect.left - 20 ||
        x > rect.right + 20 ||
        y < rect.top - 20 ||
        y > rect.bottom + 20
      ) safe = true;
    }

    const btn = document.getElementById("noBtn");
    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";

  } else {
    document.getElementById("main").innerHTML = `
      <h1>No worries! ^-^</h1>
      <h2>(Refresh to try again 😅)</h2>
    `;
  }
});

/* FLOW */

function yesClicked() {
  animationMode = "time";
  startParticles();
  renderTimePage();
}

function nextPage() {
  if (!selectedDate || !selectedTime) {
    document.getElementById("message").innerHTML = "If unsure, you may use TBD";
    return;
  }
  animationMode = "activities";
  startParticles();
  renderActivityPage();
}

function nextPageTBD() {
  selectedDate = "TBD";
  selectedTime = "TBD";
  nextPage();
}

function finalPage() {
  if (!selectedActivity) {
    document.getElementById("message").innerHTML = "Select an activity";
    return;
  }

  animationMode = "space";
  startParticles();

  const map = {
    "Restaurant": "A great meal awaits for us!",
    "Bar/club": "Party time!",
    "Cook for me": "Your place or mine, it sure will be delicious!",
    "Outdoor canvas painting": "Under the sunlight or moonlight, a beautiful sky above us",
    "Let's wing it!": "Who knows where we'll end up, but I'm sure it'll be remembered!"
  };

  const txt = map[selectedActivity] || selectedActivity;

  document.body.style.background = "linear-gradient(135deg,#0a0a1f,#1c0033,black)";
  document.body.style.color = "white";

  main.innerHTML = `
    <h1>Looking forward to this! 💫</h1>
    <h3>${selectedDate} at ${selectedTime}</h3>
    <h2>${txt}</h2>
  `;

  sendData(selectedDate, selectedTime, selectedActivity);
}

/* UI */

function renderTimePage() {
  main.innerHTML = `
    <h2>Select date & time 😊</h2>

    <div class="options">
      <div class="column">
        <button onclick="selectOption(this,'time')">9am</button>
        <button onclick="selectOption(this,'time')">1pm</button>
        <button onclick="selectOption(this,'time')">7pm</button>
      </div>
      <div class="column">
        <button onclick="selectOption(this,'date')">Friday 5th</button>
        <button onclick="selectOption(this,'date')">Saturday 6th</button>
        <button onclick="selectOption(this,'date')">Sunday 7th</button>
      </div>
    </div>

    <button class="tbd" onclick="nextPageTBD()">TBD</button>
    <button class="next" onclick="nextPage()">Next</button>
    <div id="message"></div>
  `;
}

function renderActivityPage() {
  main.innerHTML = `
    <h2>Pick an activity 😊</h2>

    <div class="column">
      <button onclick="selectActivity(this)">Restaurant</button>
      <button onclick="selectActivity(this)">Bar/club</button>
      <button onclick="selectActivity(this)">Cook for me</button>
      <button onclick="selectActivity(this)">Outdoor canvas painting</button>
      <button onclick="selectActivity(this)">Let's wing it!</button>
    </div>

    <button class="next" onclick="finalPage()">Next</button>
    <div id="message"></div>
  `;
}

/* SELECT */
function selectOption(btn,type){
  btn.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");

  if(type==="time") selectedTime=btn.innerText;
  else selectedDate=btn.innerText;
}

function selectActivity(btn){
  btn.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedActivity=btn.innerText;
}

/* SEND DATA */
function sendData(date, time, activity) {
  const formData = new FormData();

  formData.append("date", date);
  formData.append("time", time);
  formData.append("activity", activity);
  formData.append("timestamp", new Date().toLocaleString("en-US", {
    timeZone: "America/Monterrey"
  }));

  fetch("https://webhook.site/cfe43377-1dcf-46b9-abb7-55a50628792a", {
    method: "POST",
    body: formData
  }).catch(() => {});
}

/* PARTICLES */

function startParticles(){
  pieces=[];
  for(let i=0;i<80;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:6,
      d:Math.random()*1.5+0.5,
      angle:Math.random()*Math.PI,
      spin:(Math.random()-0.5)*0.05,
      type:getType()
    });
  }
}

function getType(){
  if(animationMode==="time") return Math.random()>0.5?"clock":"calendar";
  if(animationMode==="activities") return ["brush","pizza","wine","fork"][Math.floor(Math.random()*4)];
  return "hallows";
}

/* DRAW */

function drawClock(s){
  ctx.beginPath();
  ctx.arc(0,0,s,0,Math.PI*2);
  ctx.stroke();

  ctx.beginPath(); // hour hand
  ctx.moveTo(0,0);
  ctx.lineTo(0,-s*0.6);
  ctx.stroke();

  ctx.beginPath(); // minute hand
  ctx.moveTo(0,0);
  ctx.lineTo(s*0.5,0);
  ctx.stroke();
}

function drawCalendar(s){
  ctx.strokeStyle = "white";

  ctx.strokeRect(-s,-s,s*2,s*2);
  ctx.beginPath();
  ctx.moveTo(-s,-s*0.4);
  ctx.lineTo(s,-s*0.4);
  ctx.stroke();
}

function drawHallows(size){
  const h = size * 2;
  ctx.strokeStyle = "white";
  ctx.shadowColor = "royalblue";
  ctx.shadowBlur = 10;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -h / 2);
  ctx.lineTo(-size, h / 2);
  ctx.lineTo(size, h / 2);
  ctx.closePath();
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, size * 0.2, size * 0.5, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(0, -h / 2);
  ctx.lineTo(0, h / 2);
  ctx.stroke();
}

function drawPizza(s){
  ctx.strokeStyle = "red";
  ctx.beginPath();
  ctx.moveTo(0,-s); // Tip of the pizza
  ctx.lineTo(s, s); // Right corner
  ctx.quadraticCurveTo(0, s + s*0.5, -s, s); // Crust arc
  ctx.lineTo(0, -s); // Tip back to the center (close)
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, 0, s*.25, 0, Math.PI * 2);
  ctx.stroke();
}

function drawFork(s){
  ctx.strokeStyle = "black";
  ctx.beginPath();
  ctx.arc(0,-s/2,s/2,0,Math.PI);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0,-s/2);
  ctx.lineTo(0,s);
  ctx.stroke();
}

function drawWine(s){
  let scale = 1.5; // Fork size scale factor
  ctx.strokeStyle = "purple";
  const tineWidth = s * 0.2;
  const tines = 4;

  // Tines
  for(let i=0; i<tines; i++){
    let x = (i - (tines-1)/2) * tineWidth;
    ctx.beginPath();
    ctx.moveTo(x, -s);
    ctx.lineTo(x, s*0.5);
    ctx.stroke();
  }

  // Handle
  ctx.beginPath();
  ctx.moveTo(0, s*0.5);
  ctx.lineTo(0, s);
  ctx.stroke();
}

function drawBrush(s){
  let scale = 10; // Brush size scale factor
  ctx.strokeStyle = "white";
  ctx.shadowColor = "royalblue";
  ctx.shadowBlur = 5;

  // Handle
  ctx.beginPath();
  ctx.moveTo(0, s);
  ctx.lineTo(0, -s*0.5);
  ctx.stroke();

  // Ferrule (metal part)
  ctx.fillRect(-s*0.3, -s*0.5, s*0.6, s*0.2);

  // Bristles (fan shape)
  ctx.beginPath();
  ctx.moveTo(-s*0.3, -s*0.3);
  ctx.quadraticCurveTo(0, -s, s*0.3, -s*0.3);
  ctx.stroke();
}

/* LOOP */

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(animationMode==="space"){
    ctx.fillStyle="white";
    ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
  }

  pieces.forEach(p=>{
    if(animationMode==="space") return;

    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angle);

    switch(p.type){
      case "hallows": drawHallows(p.r); break;
      case "clock": drawClock(p.r); break;
      case "calendar": drawCalendar(p.r); break;
      case "pizza": drawPizza(p.r); break;
      case "wine": drawWine(p.r); break;
      case "fork": drawFork(p.r); break;
      case "brush": drawBrush(p.r); break;
    }

    ctx.restore();

    p.y+=p.d;
    p.angle+=p.spin;

    if(p.y>canvas.height){
      p.y=-20;
      p.x=Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(animate);
}

/* Prevent mobile bounce */
document.addEventListener("touchmove", e => e.preventDefault(), { passive: false });

</script>
</body>
</html>
